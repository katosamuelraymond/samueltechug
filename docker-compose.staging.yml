services:
  app:
    image: ghcr.io/katosamuelraymond/samueltechug:staging
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.samueltechug-staging.rule=Host(`staging.samueltechug.dev`)"
      - "traefik.http.routers.samueltechug-staging.entrypoints=websecure"
      - "traefik.http.routers.samueltechug-staging.tls.certresolver=le"
      - "traefik.http.services.samueltechug-staging.loadbalancer.server.port=3000"
    networks:
      - traefik_public
networks:
  traefik_public:
    external: true
